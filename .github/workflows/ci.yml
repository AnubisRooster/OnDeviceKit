name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      # Both targets are iOS-only (VoiceLoopKit depends on Speech/AVAudioSession,
      # which don't exist on macOS), so build/test against an iOS Simulator
      # destination rather than plain `swift build`/`swift test` (which target
      # the host macOS platform by default and fail on iOS-only APIs).
      #
      # Per-product schemes (BYOKLLMKit, VoiceLoopKit) only carry a build
      # action, not a test action, so tests run through the package's
      # aggregate scheme instead. Logged here in case the name ever changes.
      - name: List schemes
        run: xcodebuild -list
      - name: Test
        run: >
          xcodebuild test -scheme therAIpist-kit
          -destination 'platform=iOS Simulator,name=iPhone 15'
